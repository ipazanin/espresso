name: ci-cd
on:
  push:
    branches:
      - master
      - development
    tags:
      - '*'
  pull_request:
    branches:
      - master
      - development
env:
  PROJECT_ID: espresso-8c4ac
  ESPRESSO_DASHBOARD_IMAGE: europe-docker.pkg.dev/espresso-8c4ac/espresso/espresso-dashboard
  ESPRESSO_WEBAPI_IMAGE: europe-docker.pkg.dev/espresso-8c4ac/espresso/espresso-webapi
  FIREBASE_KEY_JSON: ${{ secrets.FIREBASE_KEY_JSON }}
  GOOGLE_ANALYTICS_KEY_JSON: ${{ secrets.GOOGLE_ANALYTICS_KEY_JSON }}
jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: .NET HealthCheck
        run: make health-check-backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: React HealthCheck
        run: make health-check-frontend

  docker-build-push-webapi:
    runs-on: ubuntu-latest
    needs: health-check
    if: startsWith(github.event.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v3

      - name: Create Secrets Files
        run: |
          echo "$FIREBASE_KEY_JSON" > source/server/WebApi/Espresso.WebApi/firebase-key.json
          echo "$GOOGLE_ANALYTICS_KEY_JSON" > source/server/WebApi/Espresso.WebApi/google-analytics-key.json

      - id: "auth"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.GC_SERVICE_ACCOUNT_KEY }}"

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v1"

      - name: "Use gcloud CLI"
        run: "gcloud info"

      - name: "Docker auth"
        run: |-
          gcloud auth configure-docker europe-docker.pkg.dev --quiet

      - name: Build webapi image
        run: |
          docker build . \
            --file source/server/WebApi/Espresso.WebApi/Dockerfile \
            --tag ${{ env.ESPRESSO_WEBAPI_IMAGE }}:${{ github.ref_name }} \
            --tag ${{ env.ESPRESSO_WEBAPI_IMAGE }}:latest \
            --build-arg REACT_APP_ENVIRONMENT=production

      - name: Push webapi image
        run: docker push --all-tags ${{ env.ESPRESSO_WEBAPI_IMAGE }}

  docker-build-push-dashboard:
    runs-on: ubuntu-latest
    needs: health-check
    if: startsWith(github.event.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v3

      - id: "auth"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.GC_SERVICE_ACCOUNT_KEY }}"

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v1"

      - name: "Use gcloud CLI"
        run: "gcloud info"

      - name: "Docker auth"
        run: |-
          gcloud auth configure-docker europe-docker.pkg.dev --quiet

      - name: Build dashboard image
        run: |
          docker build . \
            --file source/server/Dashboard/Espresso.Dashboard/Dockerfile \
            --tag ${{ env.ESPRESSO_DASHBOARD_IMAGE }}:${{ github.ref_name }} \
            --tag ${{ env.ESPRESSO_DASHBOARD_IMAGE }}:latest

      - name: Push dashboard image
        run: docker push --all-tags ${{ env.ESPRESSO_DASHBOARD_IMAGE }}

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build-push-webapi, docker-build-push-dashboard]
    if: startsWith(github.event.ref, 'refs/tags/')
    concurrency:
      group: deploy-services
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infrastructure/services
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.DEPLOY_BOT_PAT }}

      - id: "auth"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.GC_SERVICE_ACCOUNT_KEY }}"

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v1"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4
          terraform_wrapper: false

      - name: Update deploy.auto.tfvars to new tag
        run: |
          sed -i 's/^webapi_image_tag.*/webapi_image_tag    = "${{ github.ref_name }}"/' deploy.auto.tfvars
          sed -i 's/^dashboard_image_tag.*/dashboard_image_tag = "${{ github.ref_name }}"/' deploy.auto.tfvars
          echo "--- Updated deploy.auto.tfvars ---"
          cat deploy.auto.tfvars

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false

      - name: Commit deploy.auto.tfvars back to master
        run: |
          if git diff --quiet deploy.auto.tfvars; then
            echo "No changes to deploy.auto.tfvars — already at ${{ github.ref_name }}."
            exit 0
          fi
          git config user.name  "espresso-deploy-bot"
          git config user.email "deploy-bot@users.noreply.github.com"
          git add deploy.auto.tfvars
          git commit -m "chore(deploy): pin services to ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:master

      - name: Wait for webapi MIG stable
        run: |
          gcloud compute instance-groups managed wait-until espresso-web-api-instance-group \
            --zone=europe-west3-c \
            --stable \
            --timeout=900

      - name: Wait for dashboard MIG stable
        run: |
          gcloud compute instance-groups managed wait-until espresso-dashboard-instance-group \
            --zone=us-east1-b \
            --stable \
            --timeout=1500

